      <a href="index.html" class="logo">Caro Jackson Wali</a>

        </ul>
      </nav>
    </div>

  <main id="main">
    <section class="contact-section">
      <div class="container">
        <h2>Get In Touch</h2>
        <!-- action="#" keeps the form on the same page (no backend for this lab) -->
        <form class="contact-form" action="#" method="POST" novalidate>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name"
                   placeholder="Jane Doe" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject">
              <option value="">Select a subject</option>
              <option>Collaboration</option>
              <option>Employment Opportunity</option>
              <option>General Enquiry</option>
            </select>
          </div>

          <div class="form-group">
            <label for="msg">Message</label>
            <textarea id="msg" name="message" rows="5" required></textarea>
          </div>

          <button type="submit" class="btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Caro Jackson Wali — ICS 2215, Dept. of Computing</p>
    </div>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
